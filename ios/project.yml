name: Menere
options:
  bundleIdPrefix: com.copoche
  deploymentTarget:
    iOS: "26.0"
    tvOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  MenerePackage:
    path: MenerePackage
  # The tvOS app can't depend on MenerePackage (many targets are iOS-bound: UIKit/HomeKit/camera/
  # LAN). It talks to Firebase directly, so it references firebase-ios-sdk at the project level.
  # Same URL/version as MenerePackage's transitive dependency, so SPM resolves a single copy.
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.13.0"

targets:
  Menere:
    type: application
    platform: iOS
    sources:
      - path: App
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Menere.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.copoche.menere
        MARKETING_VERSION: "1.40.0"
        CURRENT_PROJECT_VERSION: "48"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: Z2FNFL3X73
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: MenerePackage
        product: AppCore
      - package: MenerePackage
        product: UserDomain
      - package: MenerePackage
        product: AuthenticationDomain
      - package: MenerePackage
        product: PushClient
      # V5 — Foundation-only app-group bridge (reads the Share Extension inbox on foreground).
      - package: MenerePackage
        product: SharedCapture
      # V5 — embed the Share Extension into the app bundle (PlugIns/).
      - target: BacanShareExtension
        embed: true
    postBuildScripts:
      - name: "Copy GoogleService-Info.plist"
        script: |
          if [ -f "${PROJECT_DIR}/App/GoogleService-Info.plist" ]; then
            cp "${PROJECT_DIR}/App/GoogleService-Info.plist" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/GoogleService-Info.plist"
          fi
        basedOnDependencyAnalysis: false

  # ---------------------------------------------------------------------------------------------
  # BacanShareExtension — the V5 ingestion front door (system share sheet → "Bacán"). Accepts
  # URLs / text / images / PDFs. DIRECT-TO-CLOUD: PDF/file/image shares write STRAIGHT to Firebase
  # (Storage + a pending `documents/{id}`) using the signed-in session restored from the shared
  # keychain group — no app-open. URL/text shares still hand off via the app-group inbox (they need
  # in-app AI routing). Links Firebase (Auth/Firestore/Storage) + the Foundation-only `SharedCapture`.
  # ---------------------------------------------------------------------------------------------
  BacanShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
    settings:
      base:
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.copoche.menere.share
        PRODUCT_NAME: BacanShareExtension
        PRODUCT_MODULE_NAME: BacanShareExtension
        MARKETING_VERSION: "1.40.0"
        CURRENT_PROJECT_VERSION: "48"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: Z2FNFL3X73
    dependencies:
      - package: MenerePackage
        product: SharedCapture
      # DIRECT-TO-CLOUD — write shared PDFs/files/images straight to the family's Firebase.
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
    postBuildScripts:
      - name: "Copy GoogleService-Info.plist"
        script: |
          if [ -f "${PROJECT_DIR}/App/GoogleService-Info.plist" ]; then
            cp "${PROJECT_DIR}/App/GoogleService-Info.plist" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/GoogleService-Info.plist"
          fi
        basedOnDependencyAnalysis: false

  # ---------------------------------------------------------------------------------------------
  # BacanTV — the living-room Apple TV app (P27-T2). Shares the Firebase backend + the pure
  # FamilyDomain model SOURCE (plain Codable structs, Foundation-only) which is compiled directly
  # into this target — no dependency on the iOS-bound MenerePackage. Auth = device-pairing.
  # ---------------------------------------------------------------------------------------------
  BacanTV:
    type: application
    platform: tvOS
    sources:
      - path: AppTV
      - path: MenerePackage/Sources/FamilyDomain
    settings:
      base:
        INFOPLIST_FILE: AppTV/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.copoche.menere.tv
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "3"
        DEVELOPMENT_TEAM: Z2FNFL3X73
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
    postBuildScripts:
      - name: "Copy GoogleService-Info.plist"
        script: |
          if [ -f "${PROJECT_DIR}/AppTV/GoogleService-Info.plist" ]; then
            cp "${PROJECT_DIR}/AppTV/GoogleService-Info.plist" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/GoogleService-Info.plist"
          fi
        basedOnDependencyAnalysis: false
