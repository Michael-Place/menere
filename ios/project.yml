name: Menere
options:
  bundleIdPrefix: com.copoche
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  MenerePackage:
    path: MenerePackage

targets:
  Menere:
    type: application
    platform: iOS
    sources:
      - path: App
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Menere.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.copoche.menere
        MARKETING_VERSION: "1.7.0"
        CURRENT_PROJECT_VERSION: "10"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: Z2FNFL3X73
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: MenerePackage
        product: AppCore
      - package: MenerePackage
        product: UserDomain
      - package: MenerePackage
        product: AuthenticationDomain
      - package: MenerePackage
        product: PushClient
    postBuildScripts:
      - name: "Copy GoogleService-Info.plist"
        script: |
          if [ -f "${PROJECT_DIR}/App/GoogleService-Info.plist" ]; then
            cp "${PROJECT_DIR}/App/GoogleService-Info.plist" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/GoogleService-Info.plist"
          fi
        basedOnDependencyAnalysis: false
